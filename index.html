<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="description" content="FitJR - Gerenciamento de treinos e acompanhamento de alunos">
  <meta name="theme-color" content="#00E676">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="manifest" href="/manifest.json">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
  <title>FitJR</title>
</head>
<body>
  <!-- Loading Screen -->
  <div id="loading-screen" class="loading-screen">
    <div class="loading-logo">
      <span class="logo-icon">💪</span>
      <h1>Fit<span class="accent">JR</span></h1>
    </div>
    <div class="loading-spinner"></div>
  </div>

  <!-- Toast Container -->
  <div id="toast-container" class="toast-container"></div>

  <!-- Main App Container -->
  <div id="app" class="app-container"></div>

  <!-- Bottom Navigation (hidden until logged in) -->
  <nav id="bottom-nav" class="bottom-nav hidden">
    <button class="nav-item" data-route="dashboard" id="nav-dashboard">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
        <polyline points="9 22 9 12 15 12 15 22"></polyline>
      </svg>
      <span>Início</span>
    </button>
    <button class="nav-item" data-route="workouts" id="nav-workouts">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="2" y="7" width="20" height="10" rx="2"></rect>
        <line x1="12" y1="3" x2="12" y2="7"></line>
        <line x1="12" y1="17" x2="12" y2="21"></line>
        <line x1="6" y1="7" x2="6" y2="17"></line>
        <line x1="18" y1="7" x2="18" y2="17"></line>
      </svg>
      <span>Treinos</span>
    </button>
    <button class="nav-item" data-route="profile" id="nav-profile">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
        <circle cx="12" cy="7" r="4"></circle>
      </svg>
      <span>Perfil</span>
    </button>
  </nav>

  <!-- Modal Container -->
  <div id="modal-overlay" class="modal-overlay hidden">
    <div id="modal-content" class="modal-content"></div>
  </div>

  <!-- Supabase SDK -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <!-- App Scripts -->
  <script src="/js/config.js"></script>
  <script src="/js/supabase.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/personal.js"></script>
  <script src="/js/student.js"></script>
  <script src="/js/app.js"></script>
</body>
</html>
